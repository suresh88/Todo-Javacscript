<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini project: Build a Todo app in Vanilla JS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

  <div class="container">
    <div class="form-box">
      <form action="#" >
        <h2 class="form_h2">Mini project: Build a Todo app</h2>
      <input type="text" placeholder="Name" id="s_name" />
      <input type="number" placeholder="Mark" id="s_mark" />
      <input type="text" placeholder="Dept.." id="s_dept" />
      <button type="submit" id="btn">Add Student</button>
      

      <!-- card -->

      <table class="card_table">
        <thead>
          <tr>
             <th>S.No</th>
            <th>Name</th>
            <th>Mark</th>
            <th>Dept</th>
            <th>Result</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="card_body"></tbody>
      </table>
       <div id="pagination" class="pagination"></div>
    </form>


    </div>
   
  </div>
    
 

    <!-- link Java Script -->
    <script src="script.js"></script>
  </body>
</html>
